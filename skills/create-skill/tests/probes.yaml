# Trigger probes for create-skill (evaluation-protocol probe panel format,
# compatible with superpowers-bench tasks.yaml).
# Baseline run 2026-06-09: F1 = 1.0 (6/6 trigger, 4/4 near-miss).
# Post-evaluator-mode rerun 2026-06-09: triggers 3/3 sampled, near-misses pass
# except near_miss_typo_edit at ~1/3 false-positive across repeats (borderline
# by design — low harm, the body's When NOT to Use redirects to a direct edit).

probes:
  capture_weekly_workflow:
    prompt: >
      I keep doing this same weekly cleanup of my twitter bookmarks by hand
      every monday — extract the links, categorize them, file them into my
      vault. can we turn this into something reusable so I don't have to
      re-explain it every time?
    expected_skills: [create-skill]

  new_slash_command:
    prompt: make me a slash command that summarizes open PR comments into a todo list
    expected_skills: [create-skill]

  prune_bloated_skill:
    prompt: my /design skill has gotten really bloated, prune it down without breaking it
    expected_skills: [create-skill]

  fix_trigger_pickup:
    prompt: >
      claude never seems to pick up my git skill when I ask about rebasing —
      can you fix whatever makes it trigger?
    expected_skills: [create-skill]

  benchmark_selection:
    prompt: can you benchmark whether my review skill actually gets selected when it should be?
    expected_skills: [create-skill]

  new_capability:
    prompt: >
      I want claude code to be able to draft standup notes from my git history,
      as a reusable thing I can run every morning
    expected_skills: [create-skill]

  quantitative_eval:
    prompt: >
      can you do a full quantitative eval of my diagnose skill — token cost,
      whether it triggers when it should, whether agents actually follow it
    expected_skills: [create-skill]

  # --- near-misses: share vocabulary, need something else ---

  near_miss_hook_automation:
    prompt: from now on whenever I stop, run the linter automatically
    expected_skills: [update-config]

  near_miss_one_off_script:
    prompt: write me a quick bash script to dedupe files in my downloads folder
    expected_skills: []

  near_miss_docs:
    prompt: write up some docs explaining how our deploy pipeline works
    expected_skills: []

  near_miss_typo_edit:
    prompt: there's a typo in step 3 of my validate skill, fix it
    expected_skills: []

  near_miss_token_count:
    prompt: how many tokens does my CLAUDE.md use? feels like it's getting expensive
    expected_skills: []
